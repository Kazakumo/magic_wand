linters:
  disable-all: true
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - contextcheck
    - wrapcheck
    - noctx
    - godot
    - gocritic
    - gochecknoinits
    - unparam
    - unused

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment

  errcheck:
    check-type-assertions: true
    check-blank: true

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  wrapcheck:
    ignorePackageGlobs:
      - "github.com/Kazakumo/magic_wand/*"

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - wrapcheck
        - errcheck

  max-issues-per-linter: 0
  max-same-issues: 0
