version: "2"

linters:
  default: none
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - contextcheck
    - wrapcheck
    - noctx
    - godot
    - gocritic
    - gochecknoinits
    - unparam
    - unused

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

    errcheck:
      check-type-assertions: true
      check-blank: true

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    wrapcheck:
      ignore-package-globs:
        - "github.com/Kazakumo/magic_wand/*"

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - wrapcheck
          - errcheck
